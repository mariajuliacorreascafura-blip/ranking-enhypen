<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Male Idols</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .option {
      background: #2a2a2a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Ranking: Male Idols</h1>
  <p>Escolha quem você prefere 💜</p>

  <div id="game">
    <div id="option1" class="option"></div>
    <div id="option2" class="option"></div>
  </div>

  <div id="result" style="display:none;">
    <h2>Seu ranking</h2>
    <ul id="rankingList"></ul>
  </div>
</div>

<script>

const members = [
  "Huening Kai",
  "Taehyun",
  "Martin",
  "Seonghyeon",
  "Maki",
  "Euijoo",
  "Nicholas",
  "Yuma",
  "Jake",
  "Ni-Ki",
  "Sunoo",
  "Bang Chan",
  "Jay",
  "Beomgyu"
];

let scores = {};
let pairs = [];
let current = 0;

const option1 = document.getElementById("option1");
const option2 = document.getElementById("option2");
const rankingList = document.getElementById("rankingList");

function init() {
  members.forEach(m => scores[m] = 0);

  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      pairs.push([members[i], members[j]]);
    }
  }

  pairs.sort(() => Math.random() - 0.5);
  showPair();
}

function showPair() {
  if (current >= pairs.length) {
    showResult();
    return;
  }

  option1.textContent = pairs[current][0];
  option2.textContent = pairs[current][1];
}

option1.onclick = () => {
  scores[option1.textContent]++;
  current++;
  showPair();
};

option2.onclick = () => {
  scores[option2.textContent]++;
  current++;
  showPair();
};

function showResult() {
  document.getElementById("game").style.display = "none";
  document.getElementById("result").style.display = "block";

  const ranking = Object.entries(scores)
    .sort((a, b) => b[1] - a[1]);

  ranking.forEach((item, index) => {
    const li = document.createElement("li");
    li.textContent = `${index + 1}. ${item[0]}`;
    rankingList.appendChild(li);
  });
}

init();

</script>

</body>
</html>
